server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
